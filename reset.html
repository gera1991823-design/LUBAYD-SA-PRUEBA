<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#087a49">
  <title>Actualizar Lubayd SA</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3f8f5;color:#13251d;font-family:Arial,sans-serif;padding:24px}.card{width:min(520px,100%);background:#fff;border:1px solid #d8e6df;border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(20,70,48,.12)}h1{margin:0 0 12px;color:#075c39}p{line-height:1.55}.note{background:#edf8f2;border-radius:14px;padding:14px;margin:18px 0}.btn{width:100%;border:0;border-radius:12px;padding:14px 18px;background:#087a49;color:#fff;font-size:16px;font-weight:700;cursor:pointer}.status{min-height:24px;margin-top:14px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <h1>Actualizar Lubayd SA</h1>
    <p>Esta herramienta elimina únicamente los archivos temporales y los service workers anteriores.</p>
    <div class="note"><b>No borra IndexedDB.</b> Los registros locales y las colas pendientes no se eliminan desde esta pantalla.</div>
    <button class="btn" id="resetButton" type="button">Limpiar caché y abrir la aplicación</button>
    <p class="status" id="status"></p>
  </main>
  <script>
    document.getElementById('resetButton').addEventListener('click', async () => {
      const button = document.getElementById('resetButton');
      const status = document.getElementById('status');
      button.disabled = true;
      status.textContent = 'Limpiando archivos anteriores…';
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          const appScope = new URL('./', location.href).href;
          await Promise.all(registrations.filter(registration => registration.scope === appScope).map(registration => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter(key => key.toLowerCase().includes('lubayd')).map(key => caches.delete(key)));
        }
        status.textContent = 'Listo. Abriendo la versión nueva…';
        location.replace(`./?fresh=${Date.now()}`);
      } catch (error) {
        status.textContent = error.message || String(error);
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
